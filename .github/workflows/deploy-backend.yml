name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'railway.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway via API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Install Railway CLI
          npm install -g @railway/cli
          
          # Login with token
          mkdir -p ~/.railway
          echo '{"token":"'$RAILWAY_TOKEN'"}' > ~/.railway/config.json
          
          # Try to deploy with error handling
          railway up 2>&1 || {
            echo "Railway deploy failed - trying alternative..."
            # Try creating project if it doesn't exist
            railway init --name Hunt-X 2>&1 || true
            railway up
          }