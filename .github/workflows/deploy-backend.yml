name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'railway.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Check Railway Project
        id: railway-check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Try to link existing project
          railway link --name "Hunt-X" 2>/dev/null || echo "Project not found, will create"
          echo "project_exists=$(railway status 2>/dev/null && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Create Railway Project (if needed)
        if: steps.railway-check.outputs.project_exists == 'false'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway init --name "Hunt-X"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service "Hunt-X" --detach || railway up